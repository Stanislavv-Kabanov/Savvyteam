name: Build and Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v2
    
    - name: Install SQLite3 and GoogleTest
      run: |
        sudo apt-get update
        sudo apt-get install -y libsqlite3-dev
        sudo apt-get install -y libgtest-dev
        cd /usr/src/gtest
        sudo cmake CMakeLists.txt
        sudo make
        sudo cp lib/*.a /usr/lib
    
    - name: Create directories
      run: mkdir -p bin build
    
    - name: Configure
      run: cmake -B build -S .
    
    - name: Build
      run: cmake --build build
    
    - name: Run tests
      run: |
        cd build
        ctest --output-on-failure
    
    - name: Check test results
      run: |
        if [ -f build/test_utils ]; then
          echo "Test utils found"
        fi
        if [ -f build/test_auth ]; then
          echo "Test auth found"
        fi
        if [ -f build/test_database ]; then
          echo "Test database found"
        fi
